<!DOCTYPE html>
<html lang="en" id="html-tag" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    
    <title>Gulshan Bauddh | Professional Schedule</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }

        /* Dynamic Animated Border */
        @keyframes rotateBorder {
            0% { border-color: #6366f1; } 
            33% { border-color: #ec4899; } 
            66% { border-color: #f59e0b; } 
            100% { border-color: #6366f1; }
        }

        .dynamic-border {
            border-width: 3px;
            border-style: solid;
            animation: rotateBorder 4s linear infinite;
        }

        .mode-transition { transition: background-color 0.5s, color 0.5s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 mode-transition min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-8 h-20 flex items-center justify-between">
            <div class="font-extrabold text-2xl tracking-tighter text-indigo-600 dark:text-indigo-400">
                GULSHAN.<span class="text-slate-400">DEV</span>
            </div>
            
            <div class="flex gap-4">
                <button onclick="toggleLanguage()" id="langBtn" class="dynamic-border px-6 py-2 rounded-xl bg-white dark:bg-slate-800 text-sm font-bold shadow-lg transition active:scale-95">
                    HINDI
                </button>
                <button onclick="toggleDarkMode()" class="dynamic-border p-2 rounded-xl bg-white dark:bg-slate-800 shadow-lg transition active:scale-95">
                    <span id="themeIcon" class="text-xl">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
            
            <div class="bg-gradient-to-r from-indigo-800 to-blue-700 p-12 text-white">
                <h1 id="headerTitle" class="text-4xl font-extrabold tracking-tight">Daily Productivity Log</h1>
                <p id="headerSub" class="text-indigo-100 mt-3 opacity-90 text-lg font-medium">Systematic schedule for Academic Excellence & Personal Growth</p>
                <div class="mt-6 flex gap-4">
                    <span class="px-4 py-1 bg-white/20 rounded-full text-xs font-bold uppercase tracking-widest">NSTI Mumbai</span>
                    <span class="px-4 py-1 bg-white/20 rounded-full text-xs font-bold uppercase tracking-widest">Full-Stack Focus</span>
                </div>
            </div>

            <div id="scheduleContainer" class="divide-y divide-slate-100 dark:divide-slate-800">
                </div>
        </div>
    </main>

    <footer class="py-16 bg-white dark:bg-slate-900 text-center border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-4xl mx-auto px-6">
            <p class="text-slate-500 dark:text-slate-400 font-semibold tracking-wide">"The secret of your future is hidden in your daily routine."</p>
            <p class="text-xs text-slate-400 mt-8 uppercase tracking-[0.3em] font-black">© 2026 GULSHAN BAUDDH | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <script>
        let currentLang = 'en';
        
        // Final Updated Routine Data
        const routineData = [
            { time: "08:00 AM to 08:25 AM", dur: "25 Mins", enTitle: "Morning Hygiene", hiTitle: "नित्य कर्म", enDesc: "Grooming and personal hygiene", hiDesc: "फ्रेश होना और व्यक्तिगत स्वच्छता" },
            { time: "08:25 AM to 08:45 AM", dur: "20 Mins", enTitle: "Get Ready", hiTitle: "तैयारी", enDesc: "Dressing up in college uniform", hiDesc: "यूनिफॉर्म पहनना और तैयार होना" },
            { time: "08:45 AM to 09:00 AM", dur: "15 Mins", enTitle: "Breakfast", hiTitle: "नाश्ता", enDesc: "Quick meal at the Mess", hiDesc: "मेस में सुबह का नाश्ता" },
            { time: "09:00 AM to 05:45 PM", dur: "8h 45m", enTitle: "Academic Hours", hiTitle: "कॉलेज समय", enDesc: "Lectures and core training sessions", hiDesc: "कक्षाएं और प्रैक्टिकल लैब सत्र", special: true },
            { time: "05:45 PM to 06:00 PM", dur: "15 Mins", enTitle: "College Exit", hiTitle: "कॉलेज से वापसी", enDesc: "Returning to the room", hiDesc: "रूम पर वापस आना" },
            { time: "06:00 PM to 06:30 PM", dur: "30 Mins", enTitle: "Refresh & Rest", hiTitle: "विश्राम", enDesc: "Unwinding after college hours", hiDesc: "फ्रेश होना और आराम" },
            { time: "06:30 PM to 08:00 PM", dur: "1h 30m", enTitle: "Personal Talk", hiTitle: "निजी समय", enDesc: "Daily connection with Kajal Ji", hiDesc: "काजल जी से फोन पर बातचीत" },
            { time: "08:00 PM to 09:00 PM", dur: "1 Hr", enTitle: "Dinner", hiTitle: "रात्रि भोज", enDesc: "Evening meal at the Mess", hiDesc: "मेस में रात का खाना" },
            { time: "09:00 PM to 09:15 PM", dur: "15 Mins", enTitle: "Arrival at Room", hiTitle: "रूम वापसी", enDesc: "Settling back in", hiDesc: "वापस कमरे पर पहुँचना" },
            { time: "09:15 PM to 09:45 PM", dur: "30 Mins", enTitle: "Family Connection", hiTitle: "पारिवारिक संवाद", enDesc: "Calls with family members", hiDesc: "घर वालों से बातचीत" },
            { time: "09:45 PM to 12:00 AM", dur: "2h 15m", enTitle: "Study & Social", hiTitle: "पढ़ाई और संवाद", enDesc: "Learning while connecting with Kajal Ji", hiDesc: "काजल जी से बात और साथ में पढ़ाई", focus: true },
            { time: "12:00 AM to 01:00 AM", dur: "1 Hr", enTitle: "Deep Study", hiTitle: "गहन अध्ययन", enDesc: "Focused, distraction-free work", hiDesc: "बिना किसी बाधा के एकाग्र पढ़ाई", deep: true },
            { time: "01:00 AM to 02:00 AM", dur: "1 Hr", enTitle: "AI Discussion", hiTitle: "AI चर्चा", enDesc: "Reviewing concepts with Online AI", hiDesc: "AI के साथ विषयों पर चर्चा" },
            { time: "02:00 AM to 08:00 AM", dur: "6 Hrs", enTitle: "Rest / Sleep", hiTitle: "शयन", enDesc: "Daily cycle recovery", hiDesc: "सोने का समय", sleep: true }
        ];

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = routineData.map(item => `
                <div class="p-8 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-all flex items-center justify-between gap-12 
                ${item.special ? 'bg-indigo-50/40 dark:bg-indigo-900/10 border-l-[10px] border-indigo-600' : ''} 
                ${item.focus ? 'bg-amber-50/40 dark:bg-amber-900/10 border-l-[10px] border-amber-500' : ''} 
                ${item.deep ? 'bg-emerald-50/40 dark:bg-emerald-900/10 border-l-[10px] border-emerald-500' : ''}">
                    
                    <div class="flex items-center gap-12">
                        <span class="w-64 font-black text-indigo-600 dark:text-indigo-400 text-xl tracking-tight shrink-0 uppercase">
                            ${item.time}
                        </span>
                        
                        <div>
                            <h3 class="font-bold text-slate-800 dark:text-slate-100 text-2xl tracking-tight">
                                ${currentLang === 'en' ? item.enTitle : item.hiTitle}
                            </h3>
                            <p class="text-slate-500 dark:text-slate-400 mt-1 text-lg">
                                ${currentLang === 'en' ? item.enDesc : item.hiDesc}
                            </p>
                        </div>
                    </div>

                    <span class="bg-indigo-600 text-white px-8 py-2 rounded-full text-sm font-black shadow-lg uppercase tracking-tighter shrink-0">
                        ${item.dur}
                    </span>
                </div>
            `).join('');
            
            document.getElementById('headerTitle').innerText = currentLang === 'en' ? 'Daily Productivity Log' : 'दैनिक दिनचर्या लॉग';
            document.getElementById('langBtn').innerText = currentLang === 'en' ? 'HINDI' : 'ENGLISH';
        }

        function toggleDarkMode() {
            const html = document.getElementById('html-tag');
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '☀️';
            } else {
                html.classList.add('dark');
                icon.innerText = '🌙';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            renderSchedule();
        }

        renderSchedule();
    </script>
</body>
</html>
