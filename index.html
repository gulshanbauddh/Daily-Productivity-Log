<!DOCTYPE html>
<html lang="en" id="html-tag" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1">
    
    <title>Gulshan's Professional Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }

        /* Dynamic Border Animation */
        @keyframes rotateBorder {
            0% { border-color: #6366f1; } /* Indigo */
            33% { border-color: #ec4899; } /* Pink */
            66% { border-color: #f59e0b; } /* Amber */
            100% { border-color: #6366f1; }
        }

        .dynamic-border {
            border-width: 3px;
            animation: rotateBorder 4s linear infinite;
        }

        /* स्मूथ ट्रांजिशन के लिए */
        .mode-transition { transition: background-color 0.5s, color 0.5s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 mode-transition">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="font-extrabold text-2xl tracking-tighter text-indigo-600 dark:text-indigo-400">GULSHAN.<span class="text-slate-400">DEV</span></div>
            
            <div class="flex gap-4">
                <button onclick="toggleLanguage()" id="langBtn" class="dynamic-border px-6 py-2 rounded-xl bg-white dark:bg-slate-800 text-sm font-bold shadow-lg transition transform active:scale-95">
                    HINDI
                </button>
                <button onclick="toggleDarkMode()" class="dynamic-border p-2 rounded-xl bg-white dark:bg-slate-800 shadow-lg transition transform active:scale-95">
                    <span id="themeIcon" class="text-xl">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-12">
        <div class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
            
            <div class="bg-gradient-to-r from-indigo-700 to-blue-600 p-10 text-white">
                <h1 id="headerTitle" class="text-4xl font-extrabold tracking-tight">Daily Productivity Log</h1>
                <p id="headerSub" class="text-indigo-100 mt-3 opacity-90 text-lg">Optimized for Desktop View & Performance</p>
            </div>

            <div id="scheduleContainer" class="divide-y divide-slate-100 dark:divide-slate-700">
                </div>
        </div>
    </div>

    <footer class="py-12 bg-white dark:bg-slate-800 text-center border-t border-slate-200 dark:border-slate-700">
        <p class="text-slate-500 dark:text-slate-400 font-medium">Built with Full-Stack Vision</p>
        <p class="text-xs text-slate-400 mt-2 uppercase tracking-[0.2em] font-bold">© 2026 Gulshan Bauddh | NSTI Mumbai</p>
    </footer>

    <script>
        let currentLang = 'en';
        
        const routineData = [
            { time: "08:00 AM", dur: "Instant", enTitle: "Wake Up", hiTitle: "सोकर उठना", enDesc: "Start of the day", hiDesc: "दिन की शुरुआत" },
            { time: "08:00 AM", dur: "25 Mins", enTitle: "Morning Hygiene", hiTitle: "नित्य कर्म", enDesc: "Getting fresh and grooming", hiDesc: "फ्रेश होना और व्यक्तिगत स्वच्छता" },
            { time: "08:25 AM", dur: "20 Mins", enTitle: "Get Ready", hiTitle: "तैयारी", enDesc: "Dressing up in uniform", hiDesc: "यूनिफॉर्म पहनना और तैयार होना" },
            { time: "08:45 AM", dur: "15 Mins", enTitle: "Breakfast", hiTitle: "नाश्ता", enDesc: "Quick meal at the mess", hiDesc: "मेस में सुबह का नाश्ता" },
            { time: "09:00 AM", dur: "8h 45m", enTitle: "Academic Hours", hiTitle: "कॉलेज समय", enDesc: "Lectures and lab sessions", hiDesc: "कक्षाएं और प्रैक्टिकल लैब", special: true },
            { time: "05:45 PM", dur: "15 Mins", enTitle: "College Exit", hiTitle: "कॉलेज से वापसी", enDesc: "Returning to room", hiDesc: "रूम पर वापस आना" },
            { time: "06:00 PM", dur: "Flexible", enTitle: "Refresh & Rest", hiTitle: "विश्राम", enDesc: "Unwinding after college", hiDesc: "फ्रेश होना और आराम" },
            { time: "06:30 PM", dur: "1h 30m", enTitle: "Personal Talk", hiTitle: "निजी समय", enDesc: "Connecting with Kajal Ji", hiDesc: "काजल जी से फोन पर बातचीत" },
            { time: "08:00 PM", dur: "1 Hr", enTitle: "Dinner", hiTitle: "रात्रि भोज", enDesc: "Heading to the mess", hiDesc: "मेस में रात का खाना" },
            { time: "09:00 PM", dur: "15 Mins", enTitle: "Return", hiTitle: "रूम वापसी", enDesc: "Settling back in", hiDesc: "वापस कमरे पर पहुँचना" },
            { time: "09:15 PM", dur: "30 Mins", enTitle: "Family Connection", hiTitle: "पारिवारिक संवाद", enDesc: "Calls with family members", hiDesc: "घर वालों से बातचीत" },
            { time: "09:45 PM", dur: "2h 15m", enTitle: "Study & Social", hiTitle: "पढ़ाई और संवाद", enDesc: "Study with Kajal Ji", hiDesc: "काजल जी से बात और साथ में पढ़ाई", focus: true },
            { time: "12:00 AM", dur: "1 Hr", enTitle: "Deep Study", hiTitle: "गहन अध्ययन", enDesc: "Focused academic work", hiDesc: "बिना किसी बाधा के पढ़ाई", deep: true },
            { time: "01:00 AM", dur: "1 Hr", enTitle: "AI Discussion", hiTitle: "AI चर्चा", enDesc: "Reviewing concepts with AI", hiDesc: "AI के साथ विषयों पर चर्चा" },
            { time: "02:00 AM", dur: "Sleep", enTitle: "Rest", hiTitle: "शयन", enDesc: "End of daily cycle", hiDesc: "सोने का समय", sleep: true }
        ];

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = routineData.map(item => `
                <div class="p-6 hover:bg-slate-50 dark:hover:bg-slate-700/30 transition flex items-center justify-between gap-8 ${item.special ? 'bg-indigo-50/50 dark:bg-indigo-900/20 border-l-8 border-indigo-600' : ''} ${item.focus ? 'bg-amber-50/50 dark:bg-amber-900/20 border-l-8 border-amber-500' : ''} ${item.deep ? 'bg-emerald-50/50 dark:bg-emerald-900/20 border-l-8 border-emerald-500' : ''}">
                    <div class="flex items-start gap-8">
                        <span class="w-32 font-bold text-indigo-600 dark:text-indigo-400 text-xl shrink-0">${item.time}</span>
                        <div>
                            <h3 class="font-bold text-slate-800 dark:text-slate-100 text-xl">${currentLang === 'en' ? item.enTitle : item.hiTitle}</h3>
                            <p class="text-slate-500 dark:text-slate-400 mt-1">${currentLang === 'en' ? item.enDesc : item.hiDesc}</p>
                        </div>
                    </div>
                    <span class="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md">${item.dur}</span>
                </div>
            `).join('');
            
            document.getElementById('headerTitle').innerText = currentLang === 'en' ? 'Daily Productivity Log' : 'दैनिक दिनचर्या लॉग';
            document.getElementById('langBtn').innerText = currentLang === 'en' ? 'HINDI' : 'ENGLISH';
        }

        function toggleDarkMode() {
            const html = document.getElementById('html-tag');
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '☀️';
            } else {
                html.classList.add('dark');
                icon.innerText = '🌙';
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            renderSchedule();
        }

        renderSchedule();
    </script>
</body>
</html>
